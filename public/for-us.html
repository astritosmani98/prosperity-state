<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Hugs</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      background: linear-gradient(160deg, #ffe4f0 0%, #eee4ff 60%, #e0eeff 100%);
      font-family: 'Georgia', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 3rem;
      gap: 1.5rem;
    }

    header { text-align: center; }
    header h1 { color: #b85080; font-size: 1.8rem; font-weight: normal; }
    header p  { color: #c090b0; font-size: 0.85rem; margin-top: 0.25rem; }

    /* ── Panels ── */
    .panels {
      display: flex;
      gap: 1.2rem;
      width: 100%;
      max-width: 680px;
      align-items: flex-start;
    }

    @media (max-width: 540px) {
      .panels { flex-direction: column; align-items: center; }
      .panel { width: 100%; max-width: 310px; }
    }

    .panel {
      flex: 1;
      background: rgba(255,255,255,0.58);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,190,220,0.45);
      border-radius: 1.6rem;
      padding: 1.4rem 1.2rem 1.6rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      box-shadow: 0 6px 28px rgba(180,90,140,0.1);
    }

    .panel-label {
      font-size: 0.72rem;
      color: #c098b8;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    /* ── Avatar row ── */
    .avatar-row {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 0.6rem;
      width: 100%;
    }

    .char-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
    }

    .char-wrap span {
      font-size: 0.68rem;
      color: #c098b8;
    }

    /* ── Characters ── */
    .character { width: 66px; height: 78px; }

    .character .happy-eyes,
    .character .happy-mouth,
    .character .blush { display: none; }

    .character.happy .normal-eyes,
    .character.happy .normal-mouth { display: none; }

    .character.happy .happy-eyes,
    .character.happy .happy-mouth,
    .character.happy .blush { display: block; }

    /* ── Jar + count ── */
    .jar-display {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.15rem;
      position: relative;
    }

    .jar-emoji {
      font-size: 2.6rem;
      line-height: 1;
      display: block;
      position: relative;
      z-index: 1;
    }

    .jar-emoji.bump { animation: jarPop 0.3s ease; }

    @keyframes jarPop {
      0%   { transform: scale(1) rotate(0deg); }
      40%  { transform: scale(1.3) rotate(-8deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    .jar-emoji.overflowing { animation: jarWobble 0.55s ease-in-out infinite alternate; }

    @keyframes jarWobble {
      from { transform: rotate(-9deg); }
      to   { transform: rotate(9deg); }
    }

    .jar-count {
      font-size: 2rem;
      font-weight: bold;
      color: #b85080;
      line-height: 1;
      transition: transform 0.15s ease;
    }

    .jar-count.bump { transform: scale(1.35); }

    .jar-count-label { font-size: 0.7rem; color: #d0a0b8; }

    /* ── Buttons ── */
    .btn-row { display: flex; flex-direction: column; gap: 0.55rem; width: 100%; }

    .btn {
      border: none;
      border-radius: 1rem;
      padding: 0.7rem 1rem;
      font-size: 0.9rem;
      font-family: inherit;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }
    .btn:active { transform: scale(0.96) !important; }

    .btn-store {
      background: linear-gradient(135deg, #f0809c, #e05878);
      color: white;
      box-shadow: 0 3px 14px rgba(210,70,110,0.3);
    }
    .btn-store:hover { transform: translateY(-1px); box-shadow: 0 5px 18px rgba(210,70,110,0.42); }

    .btn-use {
      background: white;
      color: #b85080;
      border: 2px solid #f0a0c0;
    }
    .btn-use:hover { background: #fff0f7; transform: translateY(-1px); }
    .btn-use:disabled { opacity: 0.38; cursor: not-allowed; transform: none !important; }

    /* ── Message ── */
    #message {
      text-align: center;
      font-size: 0.88rem;
      color: #c890b0;
      font-style: italic;
      min-height: 1.4rem;
    }

    /* ── Floating hearts overlay ── */
    #float-layer { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }

    .fheart {
      position: absolute;
      font-size: 1.4rem;
      animation: frise 1.5s ease-out forwards;
      opacity: 0;
    }

    @keyframes frise {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-200px) scale(0.4); }
    }
  </style>
</head>

            </g>

            </g>

            <path class="happy-mouth" d="M30 58 Q40 71 50 58" stroke="#c87860" stroke-width="2.2" fill="#ffb09a" stroke-linecap="round"/>
            <ellipse class="blush" cx="18" cy="55" rx="8" ry="4.5" fill="#ffb3c1" opacity="0.7"/>

        <button class="btn btn-store" onclick="storeHug('for-her')">🤗 He sends a hug</button>

      </div>

        <!-- Girl (sender — always normal) -->
        <div class="char-wrap">
          <svg viewBox="0 0 80 90" class="character" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="40" cy="60" rx="30" ry="36" fill="#f0c030"/>
            <rect x="20" y="74" width="40" height="16" rx="6" fill="#e890c8"/>
            <rect x="34" y="66" width="12" height="11" fill="#fce0bf"/>
            <ellipse cx="13" cy="48" rx="6" ry="8" fill="#fce0bf"/>
            <ellipse cx="67" cy="48" rx="6" ry="8" fill="#fce0bf"/>
            <ellipse cx="40" cy="46" rx="25" ry="26" fill="#fce0bf"/>
            <ellipse cx="40" cy="25" rx="25" ry="17" fill="#f0c030"/>
            <rect x="15" y="28" width="50" height="13" fill="#f0c030"/>
            <ellipse cx="34" cy="23" rx="9" ry="5.5" fill="#f8d848" opacity="0.6"/>
            <g class="normal-eyes">
              <ellipse cx="28" cy="45" rx="7.5" ry="8.5" fill="#4a3080"/>
              <ellipse cx="52" cy="45" rx="7.5" ry="8.5" fill="#4a3080"/>
              <ellipse cx="28" cy="45" rx="5.5" ry="6.5" fill="#6a50b8"/>
              <ellipse cx="52" cy="45" rx="5.5" ry="6.5" fill="#6a50b8"/>
              <circle cx="30" cy="41.5" r="2.5" fill="white"/>
              <circle cx="54" cy="41.5" r="2.5" fill="white"/>
              <circle cx="32" cy="40" r="1" fill="white"/>
              <circle cx="56" cy="40" r="1" fill="white"/>
              <line x1="20.5" y1="40" x2="18" y2="37" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="23" y1="38.5" x2="21.5" y2="35.5" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="26" y1="37.5" x2="25.5" y2="34.5" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="59.5" y1="40" x2="62" y2="37" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="57" y1="38.5" x2="58.5" y2="35.5" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="54" y1="37.5" x2="54.5" y2="34.5" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
            </g>
            <g class="happy-eyes">
              <text x="28" y="52" font-size="15" text-anchor="middle" fill="#f0c030">✦</text>

            <path class="happy-mouth" d="M30 58 Q40 71 50 58" stroke="#c87860" stroke-width="2.2" fill="#ffb09a" stroke-linecap="round"/>

            <ellipse class="blush" cx="62" cy="55" rx="8" ry="4.5" fill="#ffb3c1" opacity="0.7"/>
          </svg>
          <span>her</span>
        </div>

        <!-- Jar -->
        <div class="jar-display">
          <span class="jar-emoji" id="jar-for-him">🫙</span>
          <div class="jar-count" id="count-for-him">…</div>
          <div class="jar-count-label">hugs</div>
        </div>

        <!-- Boy (receiver — happy when overflow) -->

            <rect x="22" y="74" width="36" height="16" rx="6" fill="#7090c0"/>
            <rect x="34" y="66" width="12" height="11" fill="#fce0bf"/>
            <ellipse cx="14" cy="48" rx="6" ry="8" fill="#fce0bf"/>
            <ellipse cx="66" cy="48" rx="6" ry="8" fill="#fce0bf"/>

            <path d="M66 40 Q58 33 50 37" fill="#1c1c1c"/>
            <g class="normal-eyes">

              <ellipse cx="50" cy="48" rx="5.5" ry="6.5" fill="#252525"/>
              <circle cx="32" cy="45" r="2" fill="white"/>

      <div class="btn-row">

      </div>

  </div>

  <div id="message"></div>
  <div id="float-layer"></div>

  <script>
    const OVERFLOW = 27;
    const counts = { 'for-her': 0, 'for-him': 0 };

    async function fetchCounts() {
      try {
        const r = await fetch('/api/hugs');
        const { forHer, forHim } = await r.json();
        updateDisplay('for-her', forHer, false);
        updateDisplay('for-him', forHim, false);
      } catch {}
    }

    function updateDisplay(which, count, animate) {
      counts[which] = count;

      const countEl = document.getElementById(`count-${which}`);
      countEl.textContent = count;
      if (animate) {
        countEl.classList.remove('bump');
        void countEl.offsetWidth;
        countEl.classList.add('bump');
        setTimeout(() => countEl.classList.remove('bump'), 200);

        const jarEl = document.getElementById(`jar-${which}`);
        jarEl.classList.remove('bump');
        void jarEl.offsetWidth;
        jarEl.classList.add('bump');
        setTimeout(() => jarEl.classList.remove('bump'), 350);
      }

      document.getElementById(`use-${which}`).disabled = count <= 0;

      const jarEl = document.getElementById(`jar-${which}`);
      const receiverEl = document.getElementById(`receiver-${which}`);
      if (count >= OVERFLOW) {
        jarEl.classList.add('overflowing');
        receiverEl.classList.add('happy');
      } else {
        jarEl.classList.remove('overflowing');
        receiverEl.classList.remove('happy');
      }
    }

    async function storeHug(which) {
      try {
        const r = await fetch(`/api/hugs/${which}/store`, { method: 'POST' });
        const { count } = await r.json();
        updateDisplay(which, count, true);
        const msg = which === 'for-her' ? 'Hug sent to her 💕' : 'Hug sent to him 💕';
        showMessage(msg);
        spawnHearts('🤗', 4);
        if (count >= OVERFLOW) spawnHearts('💕', 5);
      } catch { showMessage('Something went wrong…'); }
    }

    async function useHug(which) {
      try {
        const r = await fetch(`/api/hugs/${which}/use`, { method: 'POST' });
        const { count } = await r.json();
        updateDisplay(which, count, true);
        showMessage(count === 0 ? 'Last hug used! Top it up 💌' : 'Hug redeemed 💗');
        spawnHearts('💝', 3);
      } catch { showMessage('Something went wrong…'); }
    }

    function showMessage(text) {
      const el = document.getElementById('message');
      el.textContent = text;
      clearTimeout(el._t);
      el._t = setTimeout(() => { el.textContent = ''; }, 3400);
    }

    function spawnHearts(emoji, n) {
      const layer = document.getElementById('float-layer');
      for (let i = 0; i < n; i++) {
        setTimeout(() => {
          const h = document.createElement('span');
          h.className = 'fheart';
          h.textContent = emoji;
          h.style.left  = (10 + Math.random() * 80) + '%';
          h.style.bottom = (20 + Math.random() * 35) + '%';
          h.style.animationDelay = (Math.random() * 0.25) + 's';
          layer.appendChild(h);
          setTimeout(() => h.remove(), 1700);
        }, i * 110);
      }
    }

    fetchCounts();
    setInterval(fetchCounts, 4000);
  </script>
</body>
</html>
