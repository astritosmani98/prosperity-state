<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Hugs</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Georgia', serif; }

    /* ── Nature background ── */
    .bg {
      position: fixed; inset: 0;
      background: linear-gradient(180deg,
        #5ab4f0 0%, #a8d8f8 38%,
        #72c040 38%, #58aa28 100%
      );
    }
    .bg-svg { position: absolute; inset: 0; width: 100%; height: 100%; }

    /* ── Stage ── */
    .stage {
      position: fixed; inset: 0;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding-bottom: 1rem;
    }

    /* ── Each character side ── */
    .side {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      padding: 0 1vw 0.5rem;
      pointer-events: all;
    }

    .char-svg {
      height: clamp(210px, 56vh, 400px);
      width: auto;
      display: block;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.18));
    }

    /* ── Buttons ── */
    .btns { display: flex; flex-direction: column; gap: 0.4rem; align-items: center; }

    .btn {
      border: none; border-radius: 1rem;
      padding: 0.45rem 0.9rem;
      font-size: clamp(0.72rem, 2vw, 0.88rem);
      font-family: inherit; cursor: pointer; font-weight: 600;
      transition: transform 0.1s, box-shadow 0.1s;
      white-space: nowrap;
    }
    .btn:active { transform: scale(0.93) !important; }

    .btn-send {
      background: linear-gradient(135deg, #f07898, #e0506c);
      color: white;
      box-shadow: 0 3px 12px rgba(210,60,100,0.4);
    }
    .btn-send:hover { transform: translateY(-1px); box-shadow: 0 5px 16px rgba(210,60,100,0.5); }

    .btn-use {
      background: rgba(255,255,255,0.72);
      color: #b04070;
      border: 2px solid #f0a0bc;
    }
    .btn-use:hover { background: rgba(255,255,255,0.92); }
    .btn-use:disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; }

    /* ── Message toast ── */
    #msg {
      position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%);
      background: rgba(255,255,255,0.8); backdrop-filter: blur(8px);
      border-radius: 1rem; padding: 0.35rem 1rem;
      font-size: 0.82rem; color: #b04070; font-style: italic;
      white-space: nowrap; pointer-events: none;
      opacity: 0; transition: opacity 0.3s;
    }
    #msg.show { opacity: 1; }

    /* ── Flying hearts layer ── */
    #fly { position: fixed; inset: 0; pointer-events: none; z-index: 99; }

    @keyframes burstUp {
      0%   { opacity: 1; transform: translateY(0) scale(1.2); }
      100% { opacity: 0; transform: translateY(-140px) scale(0.4); }
    }
    .burst { position: fixed; font-size: 1.4rem; pointer-events: none; animation: burstUp 1.1s ease-out forwards; }
  </style>
</head>

<script>
  const OVERFLOW = 27;
  let lastActionMs = 0;

  // ── Fetch & display ──────────────────────────────────
  async function fetchCounts() {
    if (Date.now() - lastActionMs < 7000) return;
    try {
      const r = await fetch('/api/hugs');
      if (!r.ok) return;
      const d = await r.json();
      if (typeof d.forHer === 'number') updateDisplay('for-her', d.forHer, false);
      if (typeof d.forHim === 'number') updateDisplay('for-him', d.forHim, false);
    } catch {}
  }

  function updateDisplay(which, count, animate) {
    const isHer = which === 'for-her';
    const countEl = document.getElementById(isHer ? 'count-for-him' : 'count-for-her');
    countEl.textContent = count;

    if (animate) {
      countEl.style.fontSize = '20px';
      setTimeout(() => countEl.style.fontSize = '', 280);
    }

    document.getElementById(`use-${which}`).disabled = count <= 0;

    const over = count >= OVERFLOW;
    document.getElementById(isHer ? 'overflow-for-him' : 'overflow-for-her')
      .setAttribute('display', over ? '' : 'none');

    // Update jar fill level (fills up to OVERFLOW)
    const fillId = isHer ? 'girl-jar-fill' : 'boy-jar-fill';
    const fill = document.getElementById(fillId);
    const pct = Math.min(count / OVERFLOW, 1);
    const maxH = 46, bottom = 216;
    const h = pct * maxH;
    fill.setAttribute('height', String(Math.max(h, 0)));
    fill.setAttribute('y', String(bottom - h));

    // Receiver goes happy when overflow
    if (isHer) setGirlHappy(over);  // she's the receiver of his hugs
    else        setBoyHappy(over);   // he's the receiver of her hugs
  }

  function setBoyHappy(on) {
    tog('bn', !on); tog('bh', on);
    tog('bm-n', !on); tog('bm-h', on);
    tog('bb-l', on);  tog('bb-r', on);
  }
  function setGirlHappy(on) {
    tog('gn', !on); tog('gh', on);
    tog('gm-n', !on); tog('gm-h', on);
    tog('gb-l', on);  tog('gb-r', on);
  }
  function tog(id, show) {
    document.getElementById(id).setAttribute('display', show ? '' : 'none');
  }

  // ── Actions ──────────────────────────────────────────
  async function storeHug(which) {
    lastActionMs = Date.now();
    flyHug(which);   // animate immediately, don't wait for server
    try {
      const r = await fetch(`/api/hugs/${which}/store`, { method: 'POST' });
      if (!r.ok) { showMsg('Oops, try again…'); return; }
      const d = await r.json();
      if (typeof d.count === 'number') updateDisplay(which, d.count, true);
      showMsg(which === 'for-her' ? 'Hug on its way to her 💕' : 'Hug on its way to him 💕');
    } catch { showMsg('Something went wrong…'); }
  }

  async function useHug(which) {
    lastActionMs = Date.now();
    try {
      const r = await fetch(`/api/hugs/${which}/use`, { method: 'POST' });
      if (!r.ok) { showMsg('Oops, try again…'); return; }
      const d = await r.json();
      if (typeof d.count === 'number') updateDisplay(which, d.count, true);
      showMsg(d.count === 0 ? 'Last one! Refill soon 💌' : 'Hug redeemed 💗');
      spawnBurst('💝', 3);
    } catch { showMsg('Something went wrong…'); }
  }

  // ── Flying heart animation ────────────────────────────
  function jarScreenPos(which) {
    // Boy's jar: SVG coords (141, 193) in viewBox 160×280
    // Girl's jar: SVG coords (19, 193) in viewBox 160×280
    if (which === 'for-her') {
      const r = document.getElementById('boy-svg').getBoundingClientRect();
      return { x: r.left + r.width * (141/160), y: r.top + r.height * (193/280) };
    } else {
      const r = document.getElementById('girl-svg').getBoundingClientRect();
      return { x: r.left + r.width * (19/160), y: r.top + r.height * (193/280) };
    }
  }

  function flyHug(which) {
    const layer = document.getElementById('fly');
    const from = jarScreenPos(which);
    // Target: the OTHER person's jar
    const to   = jarScreenPos(which === 'for-her' ? 'for-him' : 'for-her');
    const arcPeak = Math.min(from.y, to.y) - 90;
    const midX = (from.x + to.x) / 2;

    for (let i = 0; i < 3; i++) {
      setTimeout(() => {
        const h = document.createElement('span');
        h.textContent = i === 0 ? '🤗' : '💕';
        h.style.cssText = 'position:fixed;font-size:1.5rem;left:0;top:0;pointer-events:none;';
        layer.appendChild(h);

        const delay = i * 60;
        h.animate([
          { transform: `translate(${from.x}px,${from.y}px) scale(1)`,   opacity: 1 },
          { transform: `translate(${midX + (Math.random()-0.5)*40}px,${arcPeak - i*18}px) scale(1.5)`, opacity: 1 },
          { transform: `translate(${to.x}px,${to.y}px) scale(0.5)`,     opacity: 0 }
        ], { duration: 1100 + i * 80, delay, easing: 'ease-in-out', fill: 'forwards' })
          .onfinish = () => h.remove();
      }, i * 120);
    }
  }

  function spawnBurst(emoji, n) {
    const layer = document.getElementById('fly');
    for (let i = 0; i < n; i++) {
      setTimeout(() => {
        const h = document.createElement('span');
        h.className = 'burst';
        h.textContent = emoji;
        h.style.left = (15 + Math.random() * 70) + '%';
        h.style.top  = (30 + Math.random() * 30) + '%';
        layer.appendChild(h);
        setTimeout(() => h.remove(), 1200);
      }, i * 130);
    }
  }

  // ── Message toast ─────────────────────────────────────
  function showMsg(text) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), 3200);
  }

  fetchCounts();
  setInterval(fetchCounts, 5000);
</script>
</body>
</html>
